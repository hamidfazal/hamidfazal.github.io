<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Hamid Fazal, MD | Integrated Care & Medical Education Specialist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #0f2744;
            --primary-teal: #1a5f5a;
            --accent-gold: #c9a84c;
            --accent-gold-light: #e8d5a3;
            --bg-cream: #faf8f5;
            --bg-warm: #f5f1ec;
            --text-dark: #1a1a1a;
            --text-muted: #5a5a5a;
            --text-light: #888;
            --white: #ffffff;
            --border-light: rgba(0,0,0,0.06);
            --shadow-soft: 0 4px 24px rgba(15,39,68,0.06);
            --shadow-medium: 0 8px 40px rgba(15,39,68,0.1);
            --shadow-glow: 0 0 60px rgba(201,168,76,0.15);
            --gradient-hero: linear-gradient(160deg, #faf8f5 0%, #eef3f7 40%, #e8f0f5 100%);
            --gradient-dark: linear-gradient(135deg, #0f2744 0%, #1a3a52 50%, #1a5f5a 100%);
            --gradient-gold: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 50%, #c9a84c 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.7;
            font-size: 16px;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; letter-spacing: -0.02em; }
        h4, h5, h6 { font-family: 'Inter', sans-serif; font-weight: 600; }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(250,248,245,0.92);
            backdrop-filter: blur(20px) saturate(1.8);
            -webkit-backdrop-filter: blur(20px) saturate(1.8);
            z-index: 1000;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 72px;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }

        nav.scrolled {
            background: rgba(255,255,255,0.97);
            box-shadow: var(--shadow-soft);
            height: 64px;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary-navy);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo::before {
            content: '◆';
            color: var(--accent-gold);
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.88rem;
            position: relative;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-gold);
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
        }

        .nav-links a:hover { color: var(--primary-navy); }
        .nav-links a:hover::after { width: 100%; }

        .nav-btn {
            background: var(--gradient-dark);
            color: white !important;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(15,39,68,0.2);
            font-weight: 600 !important;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(15,39,68,0.3);
        }
        .nav-btn::after { display: none !important; }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            padding: 8rem 5% 5rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -15%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(15,39,68,0.06) 0%, transparent 70%);
            border-radius: 50%;
            animation: breathe 10s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(26,95,90,0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: breathe 12s ease-in-out infinite reverse;
        }

        @keyframes breathe {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.9; }
        }

        .hero-content {
            max-width: 1280px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 5rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-size: 3.8rem;
            line-height: 1.05;
            margin-bottom: 0.8rem;
            color: var(--primary-navy);
            font-weight: 700;
        }

        .hero-text h1 .title-accent {
            display: block;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        .hero-text .subtitle {
            font-size: 1.25rem;
            color: var(--primary-teal);
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        .hero-text .tagline {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            border-left: 3px solid var(--accent-gold);
            padding-left: 1.5rem;
            text-align: justify;
            line-height: 1.8;
        }

        .hero-cta-box {
            background: white;
            border-left: 4px solid var(--primary-navy);
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 12px 12px 0;
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hero-cta-box:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-medium);
        }

        .hero-cta-box h3 {
            margin: 0 0 8px 0;
            color: var(--primary-navy);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
        }

        .hero-cta-box p {
            margin: 0 0 8px 0;
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .hero-cta-box .resource-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 15px;
            margin-top: 6px;
            font-size: 0.88rem;
        }

        .hero-cta-box a {
            color: var(--primary-teal);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .hero-cta-box a:hover { border-bottom-color: var(--primary-teal); }

        .hero-stats {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: white;
            padding: 1rem 1.4rem;
            border-radius: 14px;
            box-shadow: var(--shadow-soft);
            border-bottom: 3px solid var(--accent-gold);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            min-width: 130px;
        }

        .stat-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-medium);
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-navy);
            display: block;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }

        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            position: relative;
            width: 340px;
            height: 340px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 25px 70px rgba(15,39,68,0.18);
            transition: transform 0.5s ease;
        }

        .profile-container:hover .profile-img {
            transform: scale(1.02);
        }

        .profile-ring {
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border: 2px solid transparent;
            border-top-color: var(--accent-gold);
            border-right-color: var(--accent-gold-light);
            border-radius: 50%;
            animation: rotate 25s linear infinite;
        }

        .profile-ring::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 50%;
            animation: rotate 35s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--gradient-dark);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(15,39,68,0.3);
            z-index: 10;
        }

        /* ===== SECTIONS ===== */
        section {
            padding: 6rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .section-header h2 {
            font-size: 2.6rem;
            color: var(--primary-navy);
            margin-bottom: 0.8rem;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: var(--gradient-gold);
            border-radius: 2px;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-top: 1.5rem;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
        }

        /* ===== PHILOSOPHY ===== */
        .philosophy {
            background: white;
            border-radius: 24px;
            padding: 3.5rem;
            box-shadow: var(--shadow-soft);
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .philosophy::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 25px;
            font-family: 'Playfair Display', serif;
            font-size: 12rem;
            color: rgba(15,39,68,0.04);
            line-height: 1;
        }

        .philosophy-content {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            line-height: 1.9;
            font-style: italic;
            position: relative;
            z-index: 1;
            text-align: justify;
            color: var(--text-dark);
        }

        .philosophy-author {
            margin-top: 1.8rem;
            font-weight: 600;
            color: var(--primary-navy);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        .philosophy-author::before {
            content: '—';
            margin-right: 8px;
            color: var(--accent-gold);
        }

        /* ===== SPECIALTIES ===== */
        .specialties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .specialty-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .specialty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .specialty-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-medium);
        }

        .specialty-card:hover::before {
            transform: scaleX(1);
        }

        .specialty-icon {
            font-size: 2.8rem;
            margin-bottom: 1.2rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .specialty-card:hover .specialty-icon {
            transform: scale(1.1);
        }

        .specialty-card h3 {
            font-size: 1.35rem;
            margin-bottom: 1.2rem;
            color: var(--primary-navy);
            font-weight: 600;
        }

        .specialty-card ul {
            list-style: none;
        }

        .specialty-card li {
            padding: 0.55rem 0;
            padding-left: 1.6rem;
            position: relative;
            font-size: 0.94rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .specialty-card li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent-gold);
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .specialty-card li:hover {
            color: var(--text-dark);
        }

        .specialty-card li:hover::before {
            transform: translateX(4px);
        }

        /* ===== TIMELINE ===== */
        .timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-navy), var(--primary-teal), var(--accent-gold));
        }

        .timeline-item {
            display: flex;
            justify-content: flex-end;
            padding-right: 50%;
            position: relative;
            margin: 2.5rem 0;
        }

        .timeline-item:nth-child(even) {
            justify-content: flex-start;
            padding-right: 0;
            padding-left: 50%;
        }

        .timeline-content {
            background: white;
            padding: 1.8rem;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            max-width: 460px;
            margin: 0 2.5rem;
            border-left: 4px solid var(--primary-navy);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .timeline-content:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
        }

        .timeline-item:nth-child(even) .timeline-content {
            border-left: none;
            border-right: 4px solid var(--primary-teal);
        }

        .timeline-date {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gradient-dark);
            color: white;
            padding: 0.5rem 1.1rem;
            border-radius: 25px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 15px rgba(15,39,68,0.2);
            white-space: nowrap;
        }

        .timeline-item:nth-child(odd) .timeline-date {
            right: calc(50% + 22px);
        }

        .timeline-item:nth-child(even) .timeline-date {
            left: calc(50% + 22px);
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: white;
            border: 4px solid var(--accent-gold);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 0 6px rgba(201,168,76,0.15);
            transition: box-shadow 0.3s ease;
        }

        .timeline-item:hover .timeline-dot {
            box-shadow: 0 0 0 10px rgba(201,168,76,0.2);
        }

        .timeline-content h4 {
            font-size: 1.15rem;
            color: var(--primary-navy);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .timeline-content .institution {
            color: var(--primary-teal);
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 0.6rem;
            letter-spacing: 0.02em;
        }

        .timeline-content p {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.7;
        }

        /* ===== GALLERY ===== */
        .photo-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 3rem;
        }

        .photo-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-light);
        }

        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-medium);
        }

        .photo-card .img-container {
            width: 100%;
            background: linear-gradient(135deg, #f8f9fa 0%, #eef1f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .photo-card .img-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(15,39,68,0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .photo-card:hover .img-container::after {
            opacity: 1;
        }

        .photo-card img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img {
            transform: scale(1.03);
        }

        .photo-canvas {
            padding: 1.2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
        }

        /* ===== SKILLS ===== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .skill-category {
            background: white;
            padding: 1.8rem;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .skill-category:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-medium);
        }

        .skill-category h4 {
            color: var(--primary-navy);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 0.6rem;
            font-weight: 600;
        }

        .skill-category ul {
            list-style: none;
        }

        .skill-category li {
            padding: 0.4rem 0;
            font-size: 0.88rem;
            color: var(--text-muted);
            padding-left: 1.2rem;
            position: relative;
            transition: color 0.3s ease;
        }

        .skill-category li::before {
            content: '•';
            color: var(--accent-gold);
            position: absolute;
            left: 0;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 0.9;
        }

        .skill-category li:hover {
            color: var(--text-dark);
        }

        /* ===== CREDENTIALS ===== */
        .credentials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .credential-item {
            background: white;
            padding: 1.5rem;
            border-radius: 14px;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: start;
            gap: 1rem;
            border: 1px solid var(--border-light);
            transition: all 0.35s ease;
        }

        .credential-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
            border-color: rgba(201,168,76,0.3);
        }

        .credential-icon {
            font-size: 1.6rem;
            min-width: 40px;
            text-align: center;
        }

        .credential-text h4 {
            font-size: 0.98rem;
            margin-bottom: 0.3rem;
            color: var(--primary-navy);
            font-weight: 600;
        }

        .credential-text p {
            font-size: 0.84rem;
            color: var(--text-light);
        }

        /* ===== CONTACT ===== */
        .contact {
            background: var(--gradient-dark);
            color: white;
            border-radius: 24px;
            padding: 4.5rem;
            text-align: center;
            margin-top: 4rem;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-medium);
        }

        .contact::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .contact::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            border-radius: 50%;
        }

        .contact h2 {
            color: white;
            font-size: 2.6rem;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .contact > p {
            position: relative;
            z-index: 1;
            color: rgba(255,255,255,0.75);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto 2.5rem;
        }

        .contact-grid {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            max-width: 320px;
        }

        .contact-icon {
            font-size: 1.8rem;
            background: rgba(255,255,255,0.12);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .contact-item:hover .contact-icon {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        .contact-item span:first-of-type {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-gold-light);
            font-weight: 500;
        }

        .contact-item a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .contact-item a:hover {
            color: var(--accent-gold-light);
        }

        .contact-item span.address-text {
            line-height: 1.5;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 3rem 2rem 2rem;
            color: var(--text-light);
            font-size: 0.88rem;
            border-top: 1px solid var(--border-light);
            margin-top: 4rem;
        }

        .certificates-banner {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .cert-badge {
            background: rgba(15,39,68,0.06);
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--primary-navy);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .cert-badge:hover {
            background: rgba(15,39,68,0.1);
            transform: translateY(-2px);
        }

        /* ===== SCROLL ANIMATIONS ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-content { grid-template-columns: 1fr; text-align: center; gap: 3rem; }
            .hero-text h1 { font-size: 2.6rem; }
            .hero-text .tagline { border-left: none; border-top: 3px solid var(--accent-gold); padding-left: 0; padding-top: 1.2rem; text-align: center; }
            .profile-container { width: 260px; height: 260px; }
            .photo-gallery { grid-template-columns: 1fr; }
            .timeline::before { left: 30px; }
            .timeline-item, .timeline-item:nth-child(even) { justify-content: flex-start; padding-left: 80px; padding-right: 0; }
            .timeline-date { left: 0 !important; right: auto !important; top: -45px; font-size: 0.75rem; }
            .timeline-dot { left: 30px; }
            .timeline-content { margin: 0; border-right: none !important; border-left: 4px solid var(--primary-navy) !important; }
            .contact { padding: 2.5rem 1.5rem; }
            .hero-stats { justify-content: center; }
            .contact-grid { gap: 2.5rem; }
            section { padding: 4rem 5%; }
            .philosophy { padding: 2rem; }
        }

        @media (max-width: 480px) {
            .hero-text h1 { font-size: 2.1rem; }
            .section-header h2 { font-size: 2rem; }
            .stat-item { min-width: 100px; padding: 0.8rem 1rem; }
            .stat-number { font-size: 1.3rem; }
        }
    </style>
